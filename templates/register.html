{% extends "base.html" %}
{% block title %}Register — NutriGuide{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="auth-card card shadow-sm border-0 mt-5">
          <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
              <span class="display-5">🌱</span>
              <h2 class="fw-bold mt-2">Create Account</h2>
              <p class="text-muted small">Start your personalized nutrition journey</p>
            </div>

            <form method="POST" action="{{ url_for('auth.register') }}" novalidate id="registerForm">
              <div class="mb-3">
                <label class="form-label fw-medium">Username</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0">
                    <i class="bi bi-person text-muted"></i>
                  </span>
                  <input type="text" name="username" class="form-control border-start-0 ps-0"
                         placeholder="Choose a username" required minlength="3" maxlength="80" />
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label fw-medium">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0">
                    <i class="bi bi-envelope text-muted"></i>
                  </span>
                  <input type="email" name="email" class="form-control border-start-0 ps-0"
                         placeholder="your@email.com" required autocomplete="email" />
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label fw-medium">Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0">
                    <i class="bi bi-lock text-muted"></i>
                  </span>
                  <input type="password" name="password" id="regPassword"
                         class="form-control border-start-0 border-end-0 ps-0"
                         placeholder="Min. 8 characters" required minlength="8"
                         autocomplete="new-password" oninput="checkPasswordStrength(this.value)" />
                  <button type="button" class="input-group-text bg-light border-start-0"
                          onclick="togglePasswordVisibility('regPassword', this)">
                    <i class="bi bi-eye text-muted"></i>
                  </button>
                </div>
                <div class="mt-1">
                  <div class="password-strength-bar" id="pwStrengthBar"></div>
                  <small class="text-muted" id="pwStrengthText"></small>
                </div>
              </div>
              <div class="mb-4">
                <label class="form-label fw-medium">Confirm Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0">
                    <i class="bi bi-lock-fill text-muted"></i>
                  </span>
                  <input type="password" name="confirm_password" id="confirmPassword"
                         class="form-control border-start-0 ps-0"
                         placeholder="Repeat password" required autocomplete="new-password" />
                </div>
              </div>
              <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                <i class="bi bi-rocket-takeoff"></i> Create Account
              </button>
            </form>

            <hr class="my-4" />
            <p class="text-center text-muted small mb-0">
              Already have an account?
              <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-medium">Sign in</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

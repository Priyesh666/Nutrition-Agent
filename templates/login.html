{% extends "base.html" %}
{% block title %}Login — NutriGuide{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="auth-card card shadow-sm border-0 mt-5">
          <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
              <span class="display-5">🥗</span>
              <h2 class="fw-bold mt-2">Welcome Back</h2>
              <p class="text-muted small">Sign in to your NutriGuide account</p>
            </div>

            <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
              <div class="mb-3">
                <label class="form-label fw-medium">Username or Email</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0">
                    <i class="bi bi-person text-muted"></i>
                  </span>
                  <input type="text" name="identifier" class="form-control border-start-0 ps-0"
                         placeholder="Enter username or email" required autocomplete="username" />
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label fw-medium">Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0">
                    <i class="bi bi-lock text-muted"></i>
                  </span>
                  <input type="password" name="password" id="loginPassword"
                         class="form-control border-start-0 border-end-0 ps-0"
                         placeholder="Enter password" required autocomplete="current-password" />
                  <button type="button" class="input-group-text bg-light border-start-0"
                          onclick="togglePasswordVisibility('loginPassword', this)">
                    <i class="bi bi-eye text-muted"></i>
                  </button>
                </div>
              </div>
              <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                  <input type="checkbox" name="remember" class="form-check-input" id="rememberMe" />
                  <label class="form-check-label text-muted small" for="rememberMe">Remember me</label>
                </div>
              </div>
              <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                <i class="bi bi-box-arrow-in-right"></i> Sign In
              </button>
            </form>

            <hr class="my-4" />
            <p class="text-center text-muted small mb-0">
              Don't have an account?
              <a href="{{ url_for('auth.register') }}" class="text-decoration-none fw-medium">Create one free</a>
            </p>
          </div>
        </div>

        <div class="text-center mt-4">
          <small class="text-muted">
            <i class="bi bi-shield-lock-fill text-success"></i>
            Secured by IBM Cloud infrastructure
          </small>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
